            --purple-mid: #5B2C6F;

            --purple-tint: #F4ECF7;
            --gold: #D4A017;
            --gold-light: #F1C40F;
            --gold-tint: #FEF9E7;
            --text: #2C2C2C;
            --text-muted: #8E8E93;
            --bg: #FAFAFA;
            --card-bg: #FFFFFF;
            --shadow: 0 1px 3px rgba(60,16,83,0.08);
            --shadow-hover: 0 4px 12px rgba(60,16,83,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* === HEADER === */
        .hero {
            background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple-mid) 60%, var(--purple-light) 100%);
            color: white;
            padding: 2.5rem 1.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 70%, rgba(212,160,23,0.12) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(212,160,23,0.08) 0%, transparent 40%);
            pointer-events: none;
        }
        .hero-content { position: relative; z-index: 1; }
        .hero h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 900;
            font-size: 1.75rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-bottom: 0.15rem;
        }
        .hero h1 span { color: var(--gold); }
        .hero .subtitle {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }
        .hero .motto {
            font-size: 0.85rem;
            opacity: 0.75;
            font-style: italic;
        }
        .gold-bar {
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        /* === SEARCH & FILTER === */
        .controls {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #EEE;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .search-wrap {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }
        .search-wrap input {
            width: 100%;
            padding: 0.65rem 0.75rem 0.65rem 2.4rem;
            border: 2px solid #E8E8E8;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .search-wrap input:focus {
            border-color: var(--purple-light);
            box-shadow: 0 0 0 3px rgba(93,44,111,0.1);
        }
        .search-wrap input::placeholder { color: #C0C0C0; }
        .filter-chips {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.6rem;
            flex-wrap: wrap;
        }
        .chip {
            padding: 0.3rem 0.85rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1.5px solid #DDD;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .chip:hover { border-color: var(--purple-light); color: var(--purple-mid); }
        .chip.active {
            background: var(--purple-deep);
            color: white;
            border-color: var(--purple-deep);
        }
        .song-count {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* === SONG LIST === */
        .song-list {
            max-width: 700px;
            margin: 0 auto;
            padding: 0.5rem 1rem 3rem;
        }
        .song-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 0.75rem;
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            transition: background 0.15s, box-shadow 0.15s;
            border-bottom: 1px solid #F0F0F0;
        }
        .song-item:hover, .song-item:active {
            background: var(--purple-tint);
            box-shadow: var(--shadow);
        }
        .song-item.no-link {
            cursor: default;
            opacity: 0.7;
        }
        .song-item.no-link:hover { background: transparent; box-shadow: none; }
        .song-num {
            font-size: 0.75rem;
            color: var(--text-muted);
            min-width: 1.6rem;
            text-align: center;
            font-weight: 600;
        }
        .song-info { flex: 1; min-width: 0; }
        .song-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--purple-deep);
            line-height: 1.3;
        }
        .song-artist {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }
        .song-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.15rem 0.45rem;
            border-radius: 4px;
            margin-left: 0.4rem;
            vertical-align: middle;
        }
        .badge-local {
            background: var(--gold-tint);
            color: var(--gold);
            border: 1px solid var(--gold);
        }
        .badge-none {
            background: #F5F5F5;
            color: #BBB;
            border: 1px solid #DDD;
        }
        .song-arrow {
            color: var(--gold);
            font-size: 1.2rem;
            flex-shrink: 0;
            opacity: 0.6;
            transition: opacity 0.15s, transform 0.15s;
        }
        .song-item:hover .song-arrow {
            opacity: 1;
            transform: translateX(2px);
        }
        .song-item.no-link .song-arrow { display: none; }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            display: none;
        }
        .empty-state.visible { display: block; }
        .empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* === FOOTER === */
        .footer {
            text-align: center;
            padding: 1.5rem 1rem 2rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            border-top: 1px solid #EEE;
            max-width: 700px;

        .footer a { color: var(--purple-light); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .footer .heart { color: var(--gold); }

        .install-banner {
            display: none;
            background: var(--gold-tint);
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            margin: 0.75rem 1rem 0;

            margin-left: auto;
            margin-right: auto;
            text-align: center;
            font-size: 0.85rem;
            color: var(--purple-deep);
            cursor: pointer;
            transition: background 0.2s;
        }
        .install-banner:hover { background: #FCF3CF; }
        .install-banner strong { color: var(--purple-deep); }
        .install-banner.visible { display: block; }

        /* === SCROLL TO TOP === */
        .scroll-top {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--purple-deep);
            color: var(--gold);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(60,16,83,0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scroll-top.visible { opacity: 1; transform: translateY(0); }

        @media (min-width: 768px) {

            .hero h1 { font-size: 2.2rem; }
            .song-item { padding: 0.9rem 1rem; }
        }
    </style>
</head>

    { title: "Kumbayah", artist: "Traditional", url: "https://genius.com/The-seekers-kumbaya-lyrics", cat: "sacred", status: "link" },
];

// === RENDER ===
const songList = document.getElementById('songList');
const searchInput = document.getElementById('search');
const songCount = document.getElementById('songCount');
const emptyState = document.getElementById('emptyState');
const chips = document.querySelectorAll('.chip');
let activeFilter = 'all';

function renderSongs() {
    songList.innerHTML = '';
    const query = searchInput.value.toLowerCase().trim();
    let visible = 0;

    songs.forEach((song) => {
        const matchesFilter = activeFilter === 'all' || song.cat === activeFilter;
        const matchesSearch = !query ||
            song.title.toLowerCase().includes(query) ||
            song.artist.toLowerCase().includes(query);

        if (!matchesFilter || !matchesSearch) return;

        visible++;

        const isLink = song.status === 'link' || song.status === 'local';
        const tag = isLink ? 'a' : 'div';
        const el = document.createElement(tag);
        el.className = 'song-item' + (isLink ? '' : ' no-link');

        if (isLink) {
            el.href = song.url;
            if (song.status === 'link') {
                el.target = '_blank';
                el.rel = 'noopener';
            }
        }

        let badge = '';
        if (song.status === 'local') {
            badge = '<span class="song-badge badge-local">Choir</span>';
        } else if (song.status === 'none') {
            badge = '<span class="song-badge badge-none">No lyrics yet</span>';
        }

        el.innerHTML = `
            <span class="song-num">${visible}</span>
            <div class="song-info">
                <div class="song-title">${highlightMatch(song.title, query)}${badge}</div>
                <div class="song-artist">${highlightMatch(song.artist, query)}</div>
            </div>
            <span class="song-arrow">›</span>
        `;
        songList.appendChild(el);
    });

    songCount.textContent = `${visible} song${visible !== 1 ? 's' : ''}`;
    emptyState.classList.toggle('visible', visible === 0);
}

function highlightMatch(text, query) {
    if (!query) return text;
    const idx = text.toLowerCase().indexOf(query);
    if (idx === -1) return text;
    return text.slice(0, idx) +
        '<mark style="background:rgba(212,160,23,0.25);border-radius:2px;padding:0 1px">' +
        text.slice(idx, idx + query.length) + '</mark>' +
        text.slice(idx + query.length);
}

searchInput.addEventListener('input', renderSongs);

chips.forEach(chip => {
    chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        renderSongs();
    });
});

// Scroll to top
const scrollBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
    scrollBtn.classList.toggle('visible', window.scrollY > 400);
});
scrollBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

// === PWA INSTALL ===
let deferredPrompt;
const installBanner = document.getElementById('installBanner');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBanner.classList.add('visible');
});

installBanner.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBanner.classList.remove('visible');
    }
});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}

renderSongs();
</script>

</body>
</html>
